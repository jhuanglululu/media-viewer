<!doctype html>
<html>

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>{{ name }}</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
			background: #0a0a0a;
			color: #e0e0e0;
			padding: 2rem;
			max-width: 700px;
			margin: 0 auto;
		}
		h1 {
			font-size: 1.25rem;
			font-weight: 500;
			color: #fff;
			margin-bottom: 1rem;
		}
		.card {
			background: #151515;
			border: 1px solid #2a2a2a;
			border-radius: 8px;
			padding: 1rem;
		}
		ul { list-style: none; }
		li {
			display: flex;
			align-items: center;
			gap: 0.5rem;
			padding: 0.6rem 0;
			border-bottom: 1px solid #1a1a1a;
		}
		li:last-child { border-bottom: none; }
		a { color: #7ab; text-decoration: none; }
		a:hover { text-decoration: underline; }
		.type { color: #666; font-size: 0.8rem; }
		.actions {
			margin-bottom: 1.25rem;
		}
		a.btn {
			display: inline-flex;
			align-items: center;
			gap: 0.4rem;
			padding: 0.5rem 1rem;
			background: #252525;
			color: #e0e0e0;
			border: 1px solid #2a2a2a;
			border-radius: 6px;
			font-size: 0.85rem;
			text-decoration: none;
		}
		a.btn:hover { background: #333; }
	</style>
</head>

<body>
	<h1>{{ name }}</h1>
	<div class="actions">
		<a class="btn" href="/folder/{{ name }}/zip">Download all as ZIP</a>
	</div>
	<div class="card">
		{% if items %}
		<ul>
			{% for item in items %}
			<li>
				<a href="/{{ item['item_name'] }}">{{ item['item_name'] }}</a>
				<span class="type">{{ item['item_type'] }}</span>
			</li>
			{% endfor %}
		</ul>
		{% else %}
		<span class="type">This folder is empty</span>
		{% endif %}
	</div>
</body>

</html>
