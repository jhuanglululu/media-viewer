<!doctype html>
<html>

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>{{ name }}</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
			background: #0a0a0a;
			color: #e0e0e0;
			display: flex;
			flex-direction: column;
			align-items: center;
			min-height: 100vh;
			padding: 2rem;
		}

		.container {
			max-width: 900px;
			width: 100%;
		}

		h1 {
			font-size: 1.25rem;
			font-weight: 500;
			color: #fff;
			margin-bottom: 1rem;
		}

		figure {
			background: #151515;
			border: 1px solid #2a2a2a;
			border-radius: 8px;
			overflow: hidden;
		}

		img {
			display: block;
			max-width: 100%;
			max-height: 75vh;
			min-height: 75vh;
			width: auto;
			height: auto;
			object-fit: contain;
			margin: 0 auto;
			image-rendering: pixelated;
		}

		figcaption {
			padding: 0.75rem 1rem;
			font-size: 0.9rem;
			color: #999;
			border-top: 1px solid #2a2a2a;
		}

		.actions {
			margin-top: 1rem;
			display: flex;
			gap: 0.75rem;
		}

		a.btn {
			display: inline-flex;
			align-items: center;
			gap: 0.4rem;
			padding: 0.5rem 1rem;
			background: #252525;
			color: #e0e0e0;
			border: 1px solid #2a2a2a;
			border-radius: 6px;
			font-size: 0.85rem;
			text-decoration: none;
		}

		a.btn:hover {
			background: #333;
		}
	</style>
</head>

<body>
	<div class="container">
		<h1>{{ name }}</h1>
		<figure>
			<img src="/image/{{ name }}" alt="{{ name }}" />
			<figcaption>{{ caption or name }}</figcaption>
		</figure>
		<div class="actions">
			<a class="btn" href="/{{ name }}/download">Download as PNG</a>
			<a class="btn" href="/image/{{ name }}">View original WebP</a>
		</div>
	</div>
</body>

</html>
