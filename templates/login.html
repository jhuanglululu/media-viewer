<!doctype html>
<html>

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Login</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
			background: #0a0a0a;
			color: #e0e0e0;
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
		}
		.card {
			background: #151515;
			border: 1px solid #2a2a2a;
			border-radius: 8px;
			padding: 2rem;
			width: 100%;
			max-width: 360px;
		}
		h1 {
			font-size: 1.25rem;
			font-weight: 500;
			margin-bottom: 1.5rem;
			color: #fff;
		}
		input {
			width: 100%;
			padding: 0.6rem 0.75rem;
			background: #0a0a0a;
			border: 1px solid #2a2a2a;
			border-radius: 6px;
			color: #e0e0e0;
			font-size: 0.9rem;
			margin-bottom: 1rem;
			outline: none;
		}
		input:focus { border-color: #555; }
		button {
			width: 100%;
			padding: 0.6rem;
			background: #fff;
			color: #0a0a0a;
			border: none;
			border-radius: 6px;
			font-size: 0.9rem;
			font-weight: 500;
			cursor: pointer;
		}
		button:hover { background: #ddd; }
	</style>
</head>

<body>
	<div class="card">
		<h1>Login</h1>
		<form method="POST" action="/login">
			<input type="password" name="token" placeholder="Token" required autofocus />
			<button type="submit">Login</button>
		</form>
	</div>
</body>

</html>
